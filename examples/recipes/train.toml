# Minimal training recipe. See docs/RECIPE_CONTRACT.md.

name    = "train_example"
repo    = "myrepo"
command = ["python", "scripts/train.py", "--out", "{outputs.checkpoint.dir}"]

[resources]
gpus = 1
cpus = 8
mem  = "32GB"
time = "04:00:00"

[outputs.checkpoint]
type   = "checkpoint_stream"
marker = "manifest.ocdbt"
alias  = "train_{run.id}"

# Submit via `labctl run-sweep <this>` to fan out as a SLURM array.

name    = "sweep_example"
repo    = "myrepo"
command = ["python", "scripts/train.py", "--lr-index", "{args.lr_index}"]

[args]
lr_index = "0"

[resources]
gpus = 1
cpus = 4
mem  = "16GB"
time = "01:00:00"

[outputs.checkpoint]
type   = "checkpoint_stream"
marker = "manifest.ocdbt"
alias  = "sweep_{run.id}_lr{args.lr_index}"

[sweep]
arg      = "lr_index"
start    = 0
end      = 7
throttle = 4
# aggregate = "aggregate.toml"

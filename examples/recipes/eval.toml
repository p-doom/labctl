# Pair with examples/policies/eval_per_checkpoint.toml for auto-dispatch.

name    = "eval_example"
repo    = "myrepo"
command = [
  "python", "scripts/eval.py",
  "--checkpoint", "{inputs.checkpoint.path}",
  "--out", "{outputs.result.dir}",
]

[resources]
gpus = 1
cpus = 4
mem  = "16GB"
time = "00:30:00"

[inputs.checkpoint]
type     = "artifact"
artifact = "train_LATEST"

[outputs.result]
type   = "eval_result"
marker = "metrics.json"
alias  = "eval_{inputs.checkpoint.alias}"

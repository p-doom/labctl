# Solo dev on a shared SLURM cluster, no group sharing.

name = "example"

[filesystem]
runs_base = "/path/to/your/labctl_runs"

[filesystem.artifact_roots]
dataset     = "/path/to/your/datasets"
checkpoint  = "/path/to/your/checkpoints"
eval_result = "/path/to/your/eval_logs"

[filesystem.output_roots]
checkpoint_stream = "/path/to/your/checkpoints"
eval_result       = "/path/to/your/eval_logs"

[repos]
myrepo = "/path/to/your/repo"

[scheduler]
kind = "slurm"

[slurm]
qos = "low"
gres_gpu_syntax = "gpu:{n}"

# Optional. Without [dispatch], `labctl agent` is a no-op.
# [dispatch]
# reconcile_interval_secs = 60
# evald_interval_secs = 300
# policies_dir = "policies"

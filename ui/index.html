<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>labctl</title>
    <!-- Set the theme class before the bundle paints, to avoid a flash of
         the wrong palette. Mirrors the logic in lib/theme.svelte.ts. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('labctl.theme') || 'system';
          var effective = pref === 'system'
            ? (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
            : pref;
          document.documentElement.classList.add(effective);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-bg-0 text-fg-0 antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
